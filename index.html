<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Tracker Dashboard</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Newsreader:wght@400;500;600&family=Public+Sans:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <h1>Tracker</h1>
            <div class="user-avatars">
                <div class="avatar me">M</div>
                <div class="avatar friend">F</div>
            </div>
        </header>

        <section class="timeline-section">
            <h2>Upcoming Events</h2>
            <div class="calendar-timeline">
                <div class="event-card">
                    <div class="event-date">Oct 12</div>
                    <div class="event-details">
                        <h4>Design Review</h4>
                        <p>Review the new mockups for the app.</p>
                    </div>
                </div>
                <div class="event-card">
                    <div class="event-date">Oct 15</div>
                    <div class="event-details">
                        <h4>Pitch Deck Due</h4>
                        <p>Finalize the startup pitch deck.</p>
                    </div>
                </div>
            </div>
        </section>

        <section class="projects-section">
            <h2>Active Projects</h2>
            <div class="project-list">
                <a href="project.html" class="project-card">
                    <div class="project-info">
                        <h3>Mobile App Alpha</h3>
                        <p>65% Complete</p>
                    </div>
                    <div class="progress-bar-container">
                        <div class="progress-bar" style="width: 65%;"></div>
                    </div>
                </a>
                <a href="project.html" class="project-card">
                    <div class="project-info">
                        <h3>Marketing Site</h3>
                        <p>30% Complete</p>
                    </div>
                    <div class="progress-bar-container">
                        <div class="progress-bar" style="width: 30%;"></div>
                    </div>
                </a>
            </div>
        </section>

        <section class="todo-section">
            <h2>Quick Tasks</h2>
            <ul class="todo-list" id="todoList">
                <li class="todo-item">
                    <label class="todo-label">
                        <input type="checkbox" class="todo-checkbox">
                        <span class="custom-checkbox"></span>
                        <span class="todo-text">Draft email copy</span>
                    </label>
                    <span class="assignee tag-me">Me</span>
                </li>
                <li class="todo-item">
                    <label class="todo-label">
                        <input type="checkbox" class="todo-checkbox">
                        <span class="custom-checkbox"></span>
                        <span class="todo-text">Buy domain name</span>
                    </label>
                    <span class="assignee tag-friend">Friend</span>
                </li>
            </ul>
        </section>
    </div>
    <script src="app.js"></script>
</body>
</html>
