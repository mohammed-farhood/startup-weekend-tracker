<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Tracker Dashboard</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Newsreader:wght@400;500;600&family=Public+Sans:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Login Modal -->
    <div id="loginOverlay" class="login-overlay">
        <div class="login-card">
            <h2>Sign In</h2>
            <p>Welcome to Startup Weekend Tracker</p>
            <div class="input-group">
                <input type="text" id="usernameInput" placeholder="Username (e.g. MOHAMMED)">
            </div>
            <div class="input-group">
                <input type="password" id="passwordInput" placeholder="Password">
            </div>
            <button id="loginBtn" class="primary-btn">Enter</button>
            <p id="loginError" class="error-text" style="display: none;">Invalid username or password.</p>
        </div>
    </div>

    <!-- Add Event Modal -->
    <div id="eventModal" class="modal-overlay" style="display: none;">
        <div class="modal-card">
            <h3>Add New Event</h3>
            <input type="text" id="eventTitle" placeholder="Event Title">
            <input type="date" id="eventDate">
            <div class="modal-actions">
                <button id="cancelEventBtn" class="text-btn">Cancel</button>
                <button id="saveEventBtn" class="primary-btn">Save</button>
            </div>
        </div>
    </div>

    <div class="app-container" style="display: none;" id="mainApp">
        <header class="app-header">
            <h1>Tracker</h1>
            <div class="user-avatars">
                <div class="avatar mohammed" title="Mohammed">M</div>
                <div class="avatar eyad" title="Eyad">E</div>
            </div>
        </header>

        <section class="calendar-section">
            <div class="section-header">
                <h2>Schedule</h2>
                <button id="addEventBtn" class="icon-btn">+</button>
            </div>
            <div class="calendar-container">
                <div class="calendar-header">
                    <div class="day-name">Sat</div>
                    <div class="day-name">Sun</div>
                    <div class="day-name">Mon</div>
                    <div class="day-name">Tue</div>
                    <div class="day-name">Wed</div>
                    <div class="day-name">Thu</div>
                    <div class="day-name highlighted">Fri</div>
                </div>
                <div class="calendar-grid" id="calendarGrid">
                    <!-- Days will be generated by JS -->
                </div>
            </div>
            <div class="events-list" id="eventsList">
                <!-- Events generated by JS -->
            </div>
        </section>

        <section class="projects-section">
            <h2>Active Projects</h2>
            <div class="project-list">
                <a href="project.html" class="project-card">
                    <div class="project-info">
                        <h3>Mobile App Alpha</h3>
                        <p>65% Complete</p>
                    </div>
                    <div class="progress-bar-container">
                        <div class="progress-bar" style="width: 65%;"></div>
                    </div>
                </a>
                <a href="project.html" class="project-card">
                    <div class="project-info">
                        <h3>Marketing Site</h3>
                        <p>30% Complete</p>
                    </div>
                    <div class="progress-bar-container">
                        <div class="progress-bar" style="width: 30%;"></div>
                    </div>
                </a>
            </div>
        </section>

        <section class="todo-section">
            <h2>Quick Tasks</h2>
            <ul class="todo-list" id="todoList">
                <li class="todo-item">
                    <label class="todo-label">
                        <input type="checkbox" class="todo-checkbox">
                        <span class="custom-checkbox"></span>
                        <span class="todo-text">Draft email copy</span>
                    </label>
                    <span class="assignee tag-mohammed">Mohammed</span>
                </li>
                <li class="todo-item">
                    <label class="todo-label">
                        <input type="checkbox" class="todo-checkbox">
                        <span class="custom-checkbox"></span>
                        <span class="todo-text">Buy domain name</span>
                    </label>
                    <span class="assignee tag-eyad">Eyad</span>
                </li>
            </ul>
        </section>
    </div>
    <script src="app.js"></script>
</body>
</html>
