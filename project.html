<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Details - Mobile App Alpha</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Newsreader:wght@400;500;600&family=Public+Sans:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Login Modal -->
    <div id="loginOverlay" class="login-overlay">
        <div class="login-card">
            <h2>Sign In</h2>
            <p>Welcome to Startup Weekend Tracker</p>
            <div class="input-group">
                <input type="text" id="usernameInput" placeholder="Username (e.g. MOHAMMED)">
            </div>
            <div class="input-group">
                <input type="password" id="passwordInput" placeholder="Password">
            </div>
            <button id="loginBtn" class="primary-btn">Enter</button>
            <p id="loginError" class="error-text" style="display: none;">Invalid username or password.</p>
        </div>
    </div>

    <div class="app-container" style="display: none;" id="mainApp">
        <header class="app-header">
            <a href="index.html" class="back-link">← Back</a>
            <div class="user-avatars">
                <div class="avatar mohammed" title="Mohammed">M</div>
                <div class="avatar eyad" title="Eyad">E</div>
            </div>
        </header>

        <section class="project-header">
            <h1>Mobile App Alpha</h1>
            <p class="project-meta">Due: Dec 1, 2026</p>
            <div class="progress-section">
                <div class="progress-labels">
                    <span>Overall Progress</span>
                    <span>65%</span>
                </div>
                <div class="progress-bar-container large">
                    <div class="progress-bar" style="width: 65%;"></div>
                </div>
            </div>
        </section>

        <section class="project-tasks">
            <h2>Tasks</h2>
            <ul class="todo-list" id="projectTodoList">
                <li class="todo-item completed">
                    <label class="todo-label">
                        <input type="checkbox" class="todo-checkbox" checked>
                        <span class="custom-checkbox"></span>
                        <span class="todo-text">Setup Repository</span>
                    </label>
                    <span class="assignee tag-mohammed">Mohammed</span>
                </li>
                <li class="todo-item">
                    <label class="todo-label">
                        <input type="checkbox" class="todo-checkbox">
                        <span class="custom-checkbox"></span>
                        <span class="todo-text">Create UI wireframes</span>
                    </label>
                    <span class="assignee tag-eyad">Eyad</span>
                </li>
                <li class="todo-item">
                    <label class="todo-label">
                        <input type="checkbox" class="todo-checkbox">
                        <span class="custom-checkbox"></span>
                        <span class="todo-text">Implement login screen</span>
                    </label>
                    <span class="assignee tag-mohammed">Mohammed</span>
                </li>
            </ul>
        </section>
    </div>
    <script src="app.js"></script>
</body>
</html>
