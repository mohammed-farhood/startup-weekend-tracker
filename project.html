<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Startup Weekend Tracker</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="apple-touch-icon" href="logo.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="SW Tracker">
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,300;1,400;1,500&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        /* ── Due date chips ───────────────────────────────────────── */
        .due-chip {
            display: inline-flex;
            align-items: center;
            font-size: 11px;
            font-family: var(--font-mono, monospace);
            padding: 2px 7px;
            border-radius: 4px;
            font-weight: 500;
            margin-right: 4px;
        }
        .due-hard {
            background: rgba(194, 98, 14, 0.12);
            color: #C2620E;
            border: 1px solid rgba(194, 98, 14, 0.25);
        }
        .due-hard.due-overdue {
            background: rgba(220, 38, 38, 0.1);
            color: #DC2626;
            border: 1px solid rgba(220, 38, 38, 0.3);
        }
        .due-loose {
            background: rgba(156, 163, 175, 0.12);
            color: var(--color-text-muted, #9CA3AF);
            border: 1px solid rgba(156, 163, 175, 0.2);
        }
        /* due date inputs in modal */
        #dueDateRow {
            margin-top: 10px;
        }
        #dueDateTypeRow {
            margin-top: 6px;
        }
        #projectTaskDueDate {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid var(--color-border, #E5E7EB);
            border-radius: 8px;
            font-family: inherit;
            font-size: 14px;
            background: var(--color-surface, #FAFAF9);
            color: var(--color-text, #1C1917);
            box-sizing: border-box;
        }

        /* ── Floating & blocked chips ────────────────────────────── */
        .tag-floating {
            background: rgba(156, 163, 175, 0.12);
            color: var(--color-text-muted, #9CA3AF);
            border: 1px solid rgba(156, 163, 175, 0.2);
            font-style: italic;
        }
        .blocked-chip {
            display: inline-flex;
            align-items: center;
            gap: 3px;
            font-size: 11px;
            padding: 2px 7px;
            border-radius: 4px;
            background: rgba(234, 179, 8, 0.1);
            color: #A16207;
            border: 1px solid rgba(234, 179, 8, 0.25);
            margin-right: 4px;
            max-width: 180px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* ── Origin card ─────────────────────────────────────────── */
        .project-origin-card {
            margin: 0 24px 4px;
            padding: 14px 18px;
            background: rgba(194, 98, 14, 0.05);
            border: 1px solid rgba(194, 98, 14, 0.15);
            border-radius: 10px;
        }
        .origin-field {
            display: none;
            align-items: baseline;
            gap: 10px;
            padding: 3px 0;
        }
        .origin-label {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            color: #C2620E;
            min-width: 80px;
            flex-shrink: 0;
        }
        .origin-value {
            font-size: 13px;
            color: var(--color-text, #1C1917);
            line-height: 1.5;
        }
        #originIdea .origin-value {
            font-style: italic;
            color: var(--color-text-muted, #78716C);
        }

        /* ── Project Brief section ────────────────────────────────── */
        .project-brief-section {
            padding: 24px;
            border-top: 1px solid var(--color-border, #E5E7EB);
        }
        .brief-empty-state {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 8px;
            padding: 16px 0;
        }
        .brief-upload-label {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 18px;
            background: rgba(194, 98, 14, 0.08);
            color: #C2620E;
            border: 1px solid rgba(194, 98, 14, 0.2);
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.15s;
        }
        .brief-upload-label:hover {
            background: rgba(194, 98, 14, 0.14);
        }
        .brief-exists-state {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
            padding: 12px 0;
        }
        .brief-meta-info {
            display: flex;
            flex-direction: column;
            gap: 3px;
        }
        .brief-filename {
            font-size: 14px;
            font-weight: 500;
            color: var(--color-text, #1C1917);
        }
        .brief-updated-by {
            font-size: 12px;
            color: var(--color-text-muted, #9CA3AF);
        }
        .brief-actions-row {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .brief-replace-label {
            display: inline-flex;
            align-items: center;
            padding: 8px 14px;
            font-size: 14px;
            font-weight: 500;
            color: var(--color-text-muted, #9CA3AF);
            cursor: pointer;
            border-radius: 6px;
            transition: background 0.15s;
        }
        .brief-replace-label:hover {
            background: var(--color-hover, rgba(0,0,0,0.04));
        }

        /* ── Brief full-screen overlay ────────────────────────────── */
        #briefOverlay {
            position: fixed;
            inset: 0;
            z-index: 1000;
            background: var(--color-bg, #FAFAF9);
            flex-direction: column;
        }
        .brief-overlay-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 20px;
            border-bottom: 1px solid var(--color-border, #E5E7EB);
            background: var(--color-surface, #FAFAF9);
            min-height: 48px;
            box-sizing: border-box;
        }
        .brief-overlay-title {
            font-size: 14px;
            font-weight: 500;
            color: var(--color-text, #1C1917);
        }
        .brief-close-btn {
            padding: 6px 14px;
            font-size: 13px;
            font-weight: 500;
            color: var(--color-text-muted, #9CA3AF);
            background: transparent;
            border: 1px solid var(--color-border, #E5E7EB);
            border-radius: 6px;
            cursor: pointer;
        }
        .brief-close-btn:hover {
            color: var(--color-text, #1C1917);
            background: var(--color-hover, rgba(0,0,0,0.04));
        }
    </style>
</head>
<body>
    <!-- Login Modal -->
    <div id="loginOverlay" class="login-overlay">
        <div class="login-card">
            <img src="logo.png" alt="Startup Weekend" class="login-logo">
            <h2>Sign In</h2>
            <div class="input-group">
                <input type="text" id="usernameInput" placeholder="Username (e.g. MOHAMMED)">
            </div>
            <div class="input-group">
                <input type="password" id="passwordInput" placeholder="Password">
            </div>
            <button id="loginBtn" class="primary-btn">Enter</button>
            <p id="loginError" class="error-text" style="display: none;">Invalid username or password.</p>
        </div>
    </div>

    <!-- Add/Edit Project Task Modal -->
    <div id="projectTaskModal" class="modal-overlay" style="display: none;">
        <div class="modal-card">
            <h3 id="projectTaskModalTitle">Add Task</h3>
            <input type="text" id="projectTaskText" placeholder="Task description">
            <select id="projectTaskAssignee" class="select-input">
                <option value="">Unassigned (floating)</option>
                <option value="Mohammed">Mohammed</option>
                <option value="Eyad">Eyad</option>
                <option value="Yusuf">Yusuf</option>
            </select>
            <div id="dueDateRow">
                <input type="date" id="projectTaskDueDate" placeholder="Due date (optional)">
            </div>
            <div id="dueDateTypeRow">
                <select id="projectTaskDueType" class="select-input">
                    <option value="hard">Hard deadline</option>
                    <option value="loose">Loose / soft</option>
                </select>
            </div>
            <div style="margin-top:6px;">
                <select id="projectTaskBlockedBy" class="select-input">
                    <option value="">Not blocked</option>
                </select>
            </div>
            <input type="hidden" id="projectTaskEditId" value="">
            <div class="modal-actions">
                <button id="cancelProjectTaskBtn" class="text-btn">Cancel</button>
                <button id="saveProjectTaskBtn" class="primary-btn">Save</button>
            </div>
        </div>
    </div>

    <!-- Brief full-screen overlay -->
    <div id="briefOverlay" style="display:none;">
        <div class="brief-overlay-header">
            <span class="brief-overlay-title" id="briefOverlayTitle"></span>
            <button class="brief-close-btn" id="briefCloseBtn">✕ Close</button>
        </div>
        <iframe id="briefIframe" sandbox="allow-same-origin" style="width:100%;height:calc(100% - 48px);border:none;background:#fff;"></iframe>
    </div>

    <div class="app-container" style="display: none;" id="mainApp">
        <header class="app-header">
            <a href="index.html" class="back-link">← Back</a>
            <div class="header-logo">
                <img src="logo.png" alt="Startup Weekend">
            </div>
            <div class="header-right">
                <div class="user-avatars">
                    <div class="avatar mohammed" title="Mohammed">M</div>
                    <div class="avatar eyad" title="Eyad">E</div>
                    <div class="avatar yusuf" title="Yusuf">Y</div>
                </div>
                <button id="logoutBtn" class="logout-btn">Sign out</button>
            </div>
        </header>

        <section class="project-header">
            <div class="project-header-top">
                <h1>Mobile App Alpha</h1>
                <button id="deleteProjectBtn" class="delete-project-btn" title="Delete this project">Delete Project</button>
            </div>
            <p class="project-meta">Loading…</p>
            <div class="progress-section">
                <div class="progress-labels">
                    <span>Overall Progress</span>
                    <span>0%</span>
                </div>
                <div class="progress-bar-container large">
                    <div class="progress-bar" style="width: 0%;"></div>
                </div>
            </div>
        </section>

        <!-- Origin card — populated by JS from activeProj if fields exist -->
        <div class="project-origin-card" id="projectOriginCard" style="display:none;">
            <div class="origin-field" id="originBorn">
                <span class="origin-label">Born</span>
                <span class="origin-value" id="originBornVal"></span>
            </div>
            <div class="origin-field" id="originPitched">
                <span class="origin-label">Pitched by</span>
                <span class="origin-value" id="originPitchedVal"></span>
            </div>
            <div class="origin-field" id="originOwner">
                <span class="origin-label">Owner</span>
                <span class="origin-value" id="originOwnerVal"></span>
            </div>
            <div class="origin-field" id="originIdea">
                <span class="origin-label">Idea</span>
                <span class="origin-value" id="originIdeaVal"></span>
            </div>
        </div>

        <section class="project-tasks">
            <div class="section-header">
                <h2>Tasks</h2>
                <button id="addProjectTaskBtn" class="icon-btn">+</button>
            </div>
            <ul class="todo-list" id="projectTodoList"></ul>
        </section>

        <!-- Time Tracker -->
        <section class="time-tracker-section">
            <div class="section-header">
                <h2>Time Tracker</h2>
                <button class="text-btn timer-collapse-toggle" id="timerCollapseBtn">hide</button>
            </div>
            <div id="timerBody">
                <div class="time-totals-row">
                    <div class="time-total-block time-block-total">
                        <div class="time-block-label">Total</div>
                        <div class="time-block-value" id="totalProjectTime">—</div>
                    </div>
                    <div class="time-total-block">
                        <div class="time-block-label">Mohammed</div>
                        <div class="time-block-value" id="mohammedTime">—</div>
                    </div>
                    <div class="time-total-block">
                        <div class="time-block-label">Eyad</div>
                        <div class="time-block-value" id="eyadTime">—</div>
                    </div>
                    <div class="time-total-block">
                        <div class="time-block-label">Yusuf</div>
                        <div class="time-block-value" id="yusufTime">—</div>
                    </div>
                </div>

                <div class="partner-status" id="partnerStatus" style="display:none;">
                    <span class="partner-status-dot"></span>
                    <span id="partnerStatusText"></span>
                </div>

                <div class="timer-control-area">
                    <div id="timerIdlePanel" class="timer-idle-panel">
                        <select id="timerTaskSelect" class="select-input timer-select">
                            <option value="">No specific task</option>
                        </select>
                        <button id="startTimerBtn" class="start-timer-btn">▶ Start Timer</button>
                    </div>
                    <div id="timerRunningPanel" class="timer-running-panel" style="display:none;">
                        <div class="timer-clock" id="timerClock">00:00:00</div>
                        <div class="timer-current-task" id="timerRunningTask"></div>
                        <button id="stopTimerBtn" class="stop-timer-btn">■ Stop</button>
                    </div>
                </div>
            </div>
        </section>

        <!-- Project Brief -->
        <section class="project-brief-section">
            <div class="section-header">
                <h2>Brief</h2>
            </div>
            <div id="briefEmpty" class="brief-empty-state" style="display:none;">
                <label for="briefUploadInput" class="brief-upload-label">+ Upload brief (.html)</label>
                <input type="file" id="briefUploadInput" accept=".html" style="display:none;">
            </div>
            <div id="briefExists" class="brief-exists-state" style="display:none;">
                <div class="brief-meta-info">
                    <span class="brief-filename" id="briefFilename"></span>
                    <span class="brief-updated-by" id="briefUpdatedBy"></span>
                </div>
                <div class="brief-actions-row">
                    <button id="briefViewBtn" class="primary-btn" style="padding:8px 16px;font-size:14px;">View</button>
                    <label for="briefReplaceInput" class="brief-replace-label">Replace</label>
                    <input type="file" id="briefReplaceInput" accept=".html" style="display:none;">
                    <button id="briefRemoveBtn" class="text-btn" style="color:var(--color-text-muted);">Remove</button>
                </div>
            </div>
        </section>
    </div>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="app.js"></script>
</body>
</html>
